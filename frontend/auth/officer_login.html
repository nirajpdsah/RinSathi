<!DOCTYPE html>
<!--
    frontend/auth/officer_login.html

    Officer Login Page — RinSathi ACLO
    Credential-based login for loan officers.
    No Google OAuth — officers are provisioned by admin.

    On successful login:
      1. Backend returns JWT with role: "officer"
      2. We store token + user in localStorage
      3. Redirect to officer dashboard
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Officer Login — RinSathi</title>
    <link rel="stylesheet" href="/assets/css/main.css">
    <style>
        /* Page-specific styles */
        .login-wrapper {
            min-height:      100vh;
            display:         flex;
            align-items:     center;
            justify-content: center;
            background:      var(--background);
            padding:         24px;
        }

        .login-box {
            width:            100%;
            max-width:        440px;
            background:       var(--surface);
            border-radius:    16px;
            box-shadow:       0 4px 24px rgba(15,32,68,0.10);
            overflow:         hidden;
        }

        /* Saffron top bar — signature RinSathi element */
        .login-header {
            background:  var(--primary);
            padding:     36px 40px 28px;
            text-align:  center;
            border-top:  4px solid var(--accent);
        }

        .login-header .brand {
            font-size:   28px;
            font-weight: 700;
            color:       white;
            letter-spacing: -0.5px;
        }

        .login-header .brand span {
            color: var(--accent);
        }

        .login-header .subtitle {
            color:      rgba(255,255,255,0.65);
            font-size:  13px;
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .login-body {
            padding: 36px 40px 40px;
        }

        .login-title {
            font-size:     20px;
            font-weight:   700;
            color:         var(--primary);
            margin-bottom: 6px;
        }

        .login-desc {
            font-size:     14px;
            color:         var(--subtle);
            margin-bottom: 28px;
            line-height:   1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .login-footer {
            text-align:   center;
            margin-top:   24px;
            padding-top:  20px;
            border-top:   1px solid var(--border);
            font-size:    12px;
            color:        var(--subtle);
        }

        /* Lock icon above form */
        .lock-icon {
            width:         48px;
            height:        48px;
            background:    rgba(245,166,35,0.12);
            border-radius: 50%;
            display:       flex;
            align-items:   center;
            justify-content: center;
            margin:        0 auto 20px;
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="login-box">

        <!-- Header -->
        <div class="login-header">
            <div class="brand">Rin<span>Sathi</span></div>
            <div class="subtitle">Autonomous Credit and Lending Orchestrator</div>
        </div>

        <!-- Form -->
        <div class="login-body">

            <div class="lock-icon">
                <!-- Lock SVG -->
                <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="#F5A623" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>

            <div class="login-title">Officer Login</div>
            <div class="login-desc">
                Enter your credentials to access the loan review dashboard.
                This portal is for authorized loan officers only.
            </div>

            <!-- Error banner — hidden until needed -->
            <div id="errorBanner" class="error-msg" style="
                background: #FEE2E2;
                border:     1px solid #FECACA;
                padding:    12px 16px;
                border-radius: 8px;
                margin-bottom: 20px;
                font-size: 14px;
            "></div>

            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input
                    class="form-input"
                    type="email"
                    id="email"
                    placeholder="officer@rinsathi.com"
                    autocomplete="email"
                />
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input
                    class="form-input"
                    type="password"
                    id="password"
                    placeholder="Enter your password"
                    autocomplete="current-password"
                />
            </div>

            <button class="btn-primary" id="loginBtn" onclick="handleLogin()">
                Sign In
            </button>

            <div class="login-footer">
                Secured by RinSathi ACLO &nbsp;·&nbsp;
                Unauthorized access is prohibited
            </div>
        </div>
    </div>
</div>

<script src="/assets/js/auth.js"></script>
<script>
    // If officer is already logged in, send them to dashboard directly
    if (isLoggedIn() && getUserRole() === 'officer') {
        window.location.href = '/templates/officer/dashboard.html';
    }

    // Allow pressing Enter to submit
    document.getElementById('password').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') handleLogin();
    });

    async function handleLogin() {
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const btn      = document.getElementById('loginBtn');
        const banner   = document.getElementById('errorBanner');

        // Hide previous error
        banner.style.display = 'none';
        banner.classList.remove('visible');

        // Basic validation
        if (!email || !password) {
            showError('Please enter both email and password.');
            return;
        }

        // Show loading state
        btn.disabled   = true;
        btn.innerHTML  = '<span class="spinner"></span>Signing in...';

        try {
            const response = await apiFetch('/auth/officer/login', {
                method: 'POST',
                body:   JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                // Save token and user info
                saveAuth(data.jwt_token, data.user);

                // Redirect to officer dashboard
                window.location.href = '/templates/officer/dashboard.html';

            } else {
                // Show the error message from backend
                showError(data.detail || 'Login failed. Please try again.');
                resetButton();
            }

        } catch (err) {
            showError('Cannot connect to server. Please try again.');
            resetButton();
        }
    }

    function showError(message) {
        const banner = document.getElementById('errorBanner');
        banner.textContent    = message;
        banner.style.display  = 'block';
    }

    function resetButton() {
        const btn    = document.getElementById('loginBtn');
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
    }
</script>

</body>
</html>
