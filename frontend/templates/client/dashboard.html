<!DOCTYPE html>
<!--
    frontend/templates/client/dashboard.html

    Client Dashboard — RinSathi ACLO
    Shows the logged-in client's loan application history and status.

    On load:
      1. guard.js verifies JWT and role = "client"
      2. Fetches applications from GET /api/v1/client/applications
      3. Renders status cards — one per application
      4. Client can see AI decision and officer remarks
      5. "Apply for Loan" button goes to apply.html
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard — RinSathi</title>
    <link rel="stylesheet" href="/assets/css/main.css">
    <style>
        .navbar {
            background:    var(--primary);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding:       0 32px;
            height:        64px;
            display:       flex;
            align-items:   center;
            justify-content: space-between;
        }

        .navbar-brand {
            font-size:   22px;
            font-weight: 800;
            color:       white;
            letter-spacing: -0.02em;
        }

        .navbar-brand span { color: var(--accent); }

        .navbar-right {
            display:     flex;
            align-items: center;
            gap:         20px;
        }

        .navbar-user {
            color:     #94A3B8;
            font-size: 14px;
        }

        .navbar-user strong { color: white; font-weight: 600; }

        .btn-logout {
            background:    transparent;
            border:        1.5px solid rgba(255, 255, 255, 0.15);
            color:         white;
            padding:       8px 18px;
            border-radius: 10px;
            font-size:     13px;
            font-weight:   600;
            cursor:        pointer;
            width:         auto;
            transition:    all 0.2s ease;
        }

        .btn-logout:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .page-body {
            max-width: 860px;
            margin:    0 auto;
            padding:   48px 24px 80px;
        }

        /* Welcome banner */
        .welcome-banner {
            background:    #0A0F1D;
            border-radius: 20px;
            padding:       32px 40px;
            margin-bottom: 36px;
            display:       flex;
            align-items:   center;
            justify-content: space-between;
            gap:           24px;
            border:        1px solid rgba(255, 255, 255, 0.08);
            box-shadow:    0 10px 30px rgba(0, 0, 0, 0.05);
            position:      relative;
            overflow:      hidden;
        }

        .welcome-banner::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 100% 0%, rgba(217, 119, 6, 0.12) 0%, transparent 60%);
            pointer-events: none;
        }

        .welcome-text h2 {
            font-size:   24px;
            font-weight: 800;
            color:       white;
            margin-bottom: 8px;
        }

        .welcome-text p {
            color:     #94A3B8;
            font-size: 14.5px;
            line-height: 1.5;
        }

        .btn-apply {
            background:    var(--accent);
            color:         white;
            border:        none;
            padding:       12px 24px;
            border-radius: 12px;
            font-weight:   600;
            font-size:     15px;
            cursor:        pointer;
            white-space:   nowrap;
            transition:    all 0.2s ease;
            width:         auto;
            flex-shrink:   0;
            box-shadow:    0 4px 12px rgba(217, 119, 6, 0.2);
        }

        .btn-apply:hover {
            background: #B45309;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(217, 119, 6, 0.3);
        }

        /* Section title */
        .section-title {
            font-size:     18px;
            font-weight:   700;
            color:         var(--primary);
            margin-bottom: 18px;
        }

        /* Application cards */
        .app-list {
            display:        flex;
            flex-direction: column;
            gap:            16px;
        }

        .app-card {
            background:    white;
            border-radius: 16px;
            border:        1px solid var(--border);
            box-shadow:    var(--card-shadow);
            overflow:      hidden;
            transition:    all 0.2s ease;
        }

        .app-card:hover {
            box-shadow: var(--hover-shadow);
            transform:  translateY(-1px);
        }

        .app-card-main {
            display:     flex;
            align-items: center;
            padding:     24px;
            gap:         24px;
        }

        /* Status indicator — left colored bar */
        .status-bar {
            width:         4px;
            height:        48px;
            border-radius: 999px;
            flex-shrink:   0;
        }

        .status-bar.pending  { background: var(--warning); }
        .status-bar.approved { background: var(--success); }
        .status-bar.rejected { background: var(--danger);  }
        .status-bar.referred { background: #8B5CF6;        }

        .app-info { flex: 1; }

        .app-amount {
            font-size:   20px;
            font-weight: 700;
            color:       var(--primary);
        }

        .app-meta {
            font-size:  13.5px;
            color:      var(--subtle);
            margin-top: 4px;
            font-weight: 500;
        }

        .app-right {
            text-align:  right;
            flex-shrink: 0;
        }

        .app-date {
            font-size:     12.5px;
            color:         var(--subtle);
            margin-top:    6px;
        }

        /* Officer remarks section */
        .app-remarks {
            border-top: 1px solid var(--border-subtle);
            padding:    16px 24px 16px 52px;
            font-size:  13.5px;
            color:      var(--text);
            line-height: 1.6;
            background: #FAF8F6;
        }

        .remarks-label {
            font-size:      11px;
            font-weight:    700;
            color:          var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom:  6px;
        }

        /* Empty state */
        .empty-state {
            text-align:    center;
            padding:       64px 32px;
            background:    white;
            border-radius: 16px;
            border:        1px solid var(--border);
            box-shadow:    var(--card-shadow);
        }

        .empty-icon    { display: flex; justify-content: center; margin-bottom: 20px; }
        .empty-title   { font-size: 20px; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
        .empty-desc    { color: var(--subtle); font-size: 14.5px; margin-bottom: 28px; line-height: 1.6; }

        /* Score pill */
        .score-pill {
            display:       inline-block;
            padding:       4px 12px;
            border-radius: 99px;
            font-size:     11.5px;
            font-weight:   700;
            margin-top:    8px;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .score-pill.high   { background: #D1FAE5; color: #065F46; }
        .score-pill.medium { background: #FEF3C7; color: #B45309; }
        .score-pill.low    { background: #FEE2E2; color: #991B1B; }

        @media (max-width: 600px) {
            .welcome-banner { flex-direction: column; align-items: flex-start; padding: 24px; }
            .btn-apply { width: 100%; text-align: center; }
            .navbar { padding: 0 16px; }
            .page-body { padding: 32px 16px; }
            .app-card-main { gap: 16px; padding: 16px; }
            .app-amount { font-size: 18px; }
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="navbar-brand">Rin<span>Sathi</span></div>
    <div class="navbar-right">
        <div class="navbar-user">
            Welcome, <strong id="clientName">—</strong>
        </div>
        <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
</nav>

<div class="page-body">

    <!-- Welcome banner -->
    <div class="welcome-banner">
        <div class="welcome-text">
            <h2>Your Loan Dashboard</h2>
            <p>Track your applications and view AI-assessed credit decisions.</p>
        </div>
        <button class="btn-apply"
                onclick="window.location.href='/templates/client/apply.html'">
            + Apply for Loan
        </button>
    </div>

    <!-- Application list -->
    <div class="section-title">My Applications</div>
    <div id="appList">
        <!-- Filled by JavaScript -->
    </div>

</div>

<script src="/assets/js/auth.js"></script>
<script src="/assets/js/guard.js"></script>
<script>
    // ── Guard ─────────────────────────────────────────────────────────────────
    guardPage('client');
    showUserInfo('clientName');

    // ── Load applications ─────────────────────────────────────────────────────
    async function loadApplications() {
        const container = document.getElementById('appList');

        try {
            const response = await apiFetch('/client/applications');

            if (!response.ok) throw new Error('Failed to load.');

            const apps = await response.json();

            if (apps.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <svg style="width:56px;height:56px;stroke:#94A3B8;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;" viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg>
                        </div>
                        <div class="empty-title">No applications yet</div>
                        <div class="empty-desc">
                            Submit your first loan application to get started.
                            Our AI pipeline assesses your application in under
                            2 seconds.
                        </div>
                        <button class="btn-primary" style="max-width:240px; margin:0 auto;"
                                onclick="window.location.href='/templates/client/apply.html'">
                            Apply Now
                        </button>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="app-list">
                    ${apps.map(app => renderAppCard(app)).join('')}
                </div>
            `;

        } catch (err) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">
                        <svg style="width:56px;height:56px;stroke:#EF4444;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    </div>
                    <div class="empty-title">Failed to load applications</div>
                    <div class="empty-desc">${err.message}</div>
                </div>
            `;
        }
    }

    function renderAppCard(app) {
        const scoreClass = app.credit_score >= 0.65 ? 'high'
                         : app.credit_score >= 0.40 ? 'medium' : 'low';

        const scorePill = app.credit_score !== null && app.credit_score !== undefined
            ? `<div class="score-pill ${scoreClass}">
                   Score: ${(app.credit_score * 100).toFixed(1)}%
               </div>`
            : '';

        const remarksHtml = app.officer_remarks
            ? `<div class="app-remarks">
                   <div class="remarks-label">Officer Remarks</div>
                   ${escHtml(app.officer_remarks)}
               </div>`
            : '';

        const nextStepHtml = app.status === 'approved'
            ? `<div style="background:#F0FDF4; border-top:1px solid #BBF7D0; padding:10px 24px;
                            font-size:12px; color:#166534; display:flex; align-items:center; gap:6px;">
                Approved — Please visit your nearest branch with printed form and original documents to claim the loan.
            </div>`
            : '';

        return `
            <a class="app-card" href="/templates/client/status.html?id=${app.id}" style="text-decoration:none; display:block;">
                <div class="app-card-main">
                    <div class="status-bar ${app.status}"></div>
                    <div class="app-info">
                        <div class="app-amount">
                            NPR ${formatNPR(app.loan_amount_npr)}
                        </div>
                        <div class="app-meta">
                            ${capitalize(app.sector)} sector
                        </div>
                        ${scorePill}
                    </div>
                    <div class="app-right">
                        <span class="badge-${app.status}">
                            ${capitalize(app.status)}
                        </span>
                        <div class="app-date">
                            ${formatDate(app.submitted_at)}
                        </div>
                        ${app.reviewed_at
                            ? `<div class="app-date">
                                   Reviewed ${formatDate(app.reviewed_at)}
                               </div>`
                            : ''}
                    </div>
                </div>
                ${remarksHtml}
                ${nextStepHtml}
            </div>
        `;
    }

    // ── Utilities ──────────────────────────────────────────────────────────────
    function formatNPR(amount) {
        return new Intl.NumberFormat('ne-NP').format(Math.round(amount));
    }

    function formatDate(iso) {
        return new Date(iso).toLocaleDateString('en-GB', {
            day: '2-digit', month: 'short', year: 'numeric'
        });
    }

    function capitalize(str) {
        return str ? str.charAt(0).toUpperCase() + str.slice(1) : '';
    }

    function escHtml(str) {
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
    }

    // ── Start ──────────────────────────────────────────────────────────────────
    loadApplications();
</script>

</body>
</html>
