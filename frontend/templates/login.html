<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RinSathi — Portal Access</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
    }
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.05); }
    }
    .glow-bg {
      animation: pulse-glow 8s ease-in-out infinite;
    }
  </style>
</head>
<body class="bg-[#0b0f19] text-gray-200 min-h-screen flex items-center justify-center p-4 overflow-hidden relative">
  <!-- Glowing Background Orbs -->
  <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-indigo-600/20 rounded-full blur-3xl glow-bg pointer-events-none"></div>
  <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-emerald-500/10 rounded-full blur-3xl glow-bg pointer-events-none" style="animation-delay: -4s;"></div>

  <div class="w-full max-w-md bg-white/5 border border-white/10 backdrop-blur-xl rounded-2xl shadow-2xl p-8 relative z-10 transition-all duration-500 hover:border-white/15">
    
    <!-- Logo & Header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center p-3 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl shadow-lg shadow-indigo-500/20 mb-4 group hover:scale-105 transition-transform duration-300">
        <!-- Secure Shield SVG -->
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
        </svg>
      </div>
      <h1 class="text-3xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white via-gray-100 to-indigo-300">RinSathi</h1>
      <p class="text-xs text-gray-400 mt-2 font-medium tracking-wide uppercase">Autonomous Credit Underwriting Portal</p>
    </div>

    <!-- Access Form -->
    <form onsubmit="event.preventDefault(); window.location.href='/dashboard';" class="space-y-5">
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">Institutional Email</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="h-4 w-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.206" />
            </svg>
          </div>
          <input type="email" required placeholder="underwriter@rinsathi.com" value="admin@rinsathi.com" class="w-full bg-[#131926] border border-white/5 rounded-xl pl-10 pr-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all placeholder:text-gray-600">
        </div>
      </div>

      <div>
        <div class="flex justify-between items-center mb-2">
          <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400">Security Key</label>
          <a href="#" class="text-xs text-indigo-400 hover:text-indigo-300 hover:underline">Forgot Key?</a>
        </div>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="h-4 w-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
          </div>
          <input type="password" required placeholder="••••••••••••" value="password" class="w-full bg-[#131926] border border-white/5 rounded-xl pl-10 pr-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all placeholder:text-gray-600">
        </div>
      </div>

      <button type="submit" class="w-full bg-gradient-to-r from-indigo-500 to-indigo-600 hover:from-indigo-600 hover:to-indigo-700 text-white font-semibold py-3.5 rounded-xl shadow-lg shadow-indigo-500/10 hover:shadow-indigo-500/20 transform active:scale-[0.98] transition-all cursor-pointer text-sm tracking-wide">
        Access Underwriting Suite
      </button>
    </form>

    <!-- Navigation Hub Links -->
    <div class="mt-8 pt-6 border-t border-white/5 text-center space-y-3">
      <span class="text-xs text-gray-500 block">Or jump directly to demo interfaces:</span>
      <div class="flex justify-center gap-4">
        <a href="/dashboard" class="px-3 py-1.5 bg-indigo-500/10 hover:bg-indigo-500/20 text-indigo-300 rounded-lg text-xs font-semibold border border-indigo-500/20 transition-all">
          Bank Dashboard
        </a>
        <a href="/apply" class="px-3 py-1.5 bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-300 rounded-lg text-xs font-semibold border border-emerald-500/20 transition-all">
          Income Verification
        </a>
      </div>
    </div>

  </div>
</body>
</html>
